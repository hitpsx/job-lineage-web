<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作业血缘关系查询系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border: 1px solid #e9ecef;
        }
        
        .section-title {
            font-size: 1.3em;
            color: #495057;
            margin-bottom: 15px;
            font-weight: bold;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #495057;
            font-weight: 500;
        }
        
        input[type="text"],
        input[type="number"],
        button {
            width: 100%;
            padding: 12px;
            border: 2px solid #ced4da;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        input[type="text"]:focus,
        input[type="number"]:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:disabled {
            background: #6c757d;
            cursor: not-allowed;
            transform: none;
        }
        
        .status-message {
            margin-top: 10px;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }
        
        .status-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        
        .stat-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 2px solid #e9ecef;
        }
        
        .stat-label {
            color: #6c757d;
            font-size: 0.9em;
            margin-bottom: 5px;
        }
        
        .stat-value {
            color: #667eea;
            font-size: 1.8em;
            font-weight: bold;
        }
        
        .results-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        
        @media (max-width: 768px) {
            .results-container {
                grid-template-columns: 1fr;
            }
        }
        
        .result-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #e9ecef;
        }
        
        .result-title {
            font-size: 1.2em;
            color: #495057;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        .job-list {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .job-item {
            padding: 10px;
            margin-bottom: 8px;
            background: #f8f9fa;
            border-radius: 5px;
            border-left: 4px solid #667eea;
        }
        
        .job-item.level-1 { border-left-color: #28a745; }
        .job-item.level-2 { border-left-color: #ffc107; }
        .job-item.level-3 { border-left-color: #fd7e14; }
        .job-item.level-4 { border-left-color: #dc3545; }
        
        .level-badge {
            display: inline-block;
            padding: 2px 8px;
            background: #667eea;
            color: white;
            border-radius: 3px;
            font-size: 0.8em;
            margin-right: 8px;
        }
        
        .parent-info {
            font-size: 0.85em;
            color: #6c757d;
            margin-top: 5px;
        }
        
        .empty-message {
            text-align: center;
            color: #6c757d;
            padding: 20px;
        }
        
        #statsSection, #resultsSection {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>作业血缘关系查询系统</h1>
        
        <!-- 数据刷新区域 -->
        <div class="section">
            <div class="section-title">数据管理</div>
            <button onclick="refreshData()" id="refreshBtn">刷新数据库数据</button>
            <div id="refreshStatus" class="status-message"></div>
        </div>
        
        <!-- 查询区域 -->
        <div class="section">
            <div class="section-title">查询作业血缘关系</div>
            <div class="form-group">
                <label for="jobName">作业名称：</label>
                <input type="text" id="jobName" placeholder="请输入作业名称，如：DCM_ISP">
            </div>
            <div class="form-group">
                <label for="maxLevel">查询层级：</label>
                <input type="number" id="maxLevel" value="4" min="1" max="10">
            </div>
            <button onclick="queryLineage()" id="queryBtn" disabled>查询血缘关系</button>
            <div id="queryStatus" class="status-message"></div>
        </div>
        
        <!-- 统计信息 -->
        <div class="section" id="statsSection">
            <div class="section-title">数据统计</div>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-label">总作业数</div>
                    <div class="stat-value" id="totalJobs">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">下游索引</div>
                    <div class="stat-value" id="downIndexSize">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">上游索引</div>
                    <div class="stat-value" id="upIndexSize">0</div>
                </div>
            </div>
        </div>
        
        <!-- 查询结果 -->
        <div id="resultsSection">
            <div class="results-container">
                <div class="result-section">
                    <div class="result-title">上游依赖</div>
                    <ul id="upstreamList" class="job-list"></ul>
                </div>
                <div class="result-section">
                    <div class="result-title">下游影响</div>
                    <ul id="downstreamList" class="job-list"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        
        // 刷新数据库数据
        async function refreshData() {
            const refreshBtn = document.getElementById('refreshBtn');
            const statusElement = document.getElementById('refreshStatus');
            
            refreshBtn.disabled = true;
            refreshBtn.textContent = '刷新中...';
            
            try {
                const response = await fetch(`${API_BASE}/refresh`, {
                    method: 'POST'
                });
                const result = await response.json();
                
                if (result.success) {
                    showStatus('refreshStatus', result.message, 'success');
                    showStats(result.stats);
                    document.getElementById('queryBtn').disabled = false;
                } else {
                    showStatus('refreshStatus', result.message, 'error');
                }
                
            } catch (error) {
                showStatus('refreshStatus', '刷新失败: ' + error.message, 'error');
            } finally {
                refreshBtn.disabled = false;
                refreshBtn.textContent = '刷新数据库数据';
            }
        }
        
        // 查询血缘关系
        async function queryLineage() {
            const jobName = document.getElementById('jobName').value.trim();
            const maxLevel = document.getElementById('maxLevel').value;
            
            if (!jobName) {
                showStatus('queryStatus', '请输入作业名称', 'error');
                return;
            }
            
            const queryBtn = document.getElementById('queryBtn');
            queryBtn.disabled = true;
            queryBtn.textContent = '查询中...';
            
            try {
                const response = await fetch(`${API_BASE}/query?jobName=${encodeURIComponent(jobName)}&maxLevel=${maxLevel}`);
                const result = await response.json();
                
                if (result.success) {
                    showStatus('queryStatus', '查询成功', 'success');
                    showResults(result.data);
                } else {
                    showStatus('queryStatus', result.message, 'error');
                }
                
            } catch (error) {
                showStatus('queryStatus', '查询失败: ' + error.message, 'error');
            } finally {
                queryBtn.disabled = false;
                queryBtn.textContent = '查询血缘关系';
            }
        }
        
        // 显示状态消息
        function showStatus(elementId, message, type) {
            const element = document.getElementById(elementId);
            element.innerHTML = message;
            element.className = `status-message ${type}`;
            element.style.display = 'block';
        }
        
        // 显示统计信息
        function showStats(stats) {
            if (!stats) return;
            
            document.getElementById('totalJobs').textContent = stats.totalJobs || 0;
            document.getElementById('downIndexSize').textContent = stats.downIndexSize || 0;
            document.getElementById('upIndexSize').textContent = stats.upIndexSize || 0;
            document.getElementById('statsSection').style.display = 'block';
        }
        
        // 显示查询结果
        function showResults(data) {
            if (!data) return;
            
            document.getElementById('resultsSection').style.display = 'block';
            
            // 显示上游依赖
            const upstreamList = document.getElementById('upstreamList');
            if (data.upstream && data.upstream.length > 0) {
                upstreamList.innerHTML = data.upstream.map(job => 
                    `<li class="job-item level-${job.level}">
                        <span class="level-badge">层级${job.level}</span>
                        ${job.job}
                        <div class="parent-info">← 直接依赖：${job.parent}</div>
                    </li>`
                ).join('');
            } else {
                upstreamList.innerHTML = '<li class="empty-message">无上游依赖</li>';
            }
            
            // 显示下游影响
            const downstreamList = document.getElementById('downstreamList');
            if (data.downstream && data.downstream.length > 0) {
                downstreamList.innerHTML = data.downstream.map(job => 
                    `<li class="job-item level-${job.level}">
                        <span class="level-badge">层级${job.level}</span>
                        ${job.job}
                        <div class="parent-info">← 直接依赖：${job.parent}</div>
                    </li>`
                ).join('');
            } else {
                downstreamList.innerHTML = '<li class="empty-message">无下游影响</li>';
            }
        }
        
        // 页面加载时检查状态
        window.onload = async function() {
            try {
                const response = await fetch(`${API_BASE}/health`);
                const result = await response.json();
                
                if (result.dataLoaded) {
                    document.getElementById('queryBtn').disabled = false;
                    
                    // 获取统计信息
                    const statsResponse = await fetch(`${API_BASE}/stats`);
                    const statsResult = await statsResponse.json();
                    if (statsResult.success) {
                        showStats(statsResult.stats);
                    }
                } else {
                    showStatus('refreshStatus', '数据尚未加载，请点击刷新按钮加载数据库数据', 'error');
                }
            } catch (error) {
                console.log('健康检查失败:', error);
                showStatus('refreshStatus', '服务连接失败，请检查后端服务是否启动', 'error');
            }
        };
    </script>
</body>
</html>
