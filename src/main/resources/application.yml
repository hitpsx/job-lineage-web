server:
  port: 8080

spring:
  application:
    name: job-lineage-web
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/psx?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&rewriteBatchedStatements=true&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:app_user}
    password: ${DB_PASSWORD:psx}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 40
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

logging:
  level:
    root: INFO
    com.example.joblineage: DEBUG
    org.hibernate.SQL: DEBUG
