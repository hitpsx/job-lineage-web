server:
  port: 8080

spring:
  application:
    name: job-lineage-web
  datasource:
    url: jdbc:mysql://localhost:3306/psx?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

logging:
  level:
    root: INFO
    com.example.joblineage: DEBUG
    org.hibernate.SQL: DEBUG
